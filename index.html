<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathias Christ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #e8f0fe;
      color: #1a1a2e;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #1565c0, #42a5f5);
      color: white;
      padding: 70px 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(21, 101, 192, 0.35);
    }

    header h1 {
      font-size: 3rem;
      letter-spacing: 3px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header p {
      margin-top: 10px;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.8);
    }

    main {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    section {
      background: white;
      border-radius: 14px;
      padding: 30px;
      box-shadow: 0 4px 16px rgba(21, 101, 192, 0.1);
      border-top: 4px solid #1976d2;
    }

    section h2 {
      font-size: 1.4rem;
      margin-bottom: 15px;
      color: #1565c0;
      border-bottom: 3px solid #42a5f5;
      padding-bottom: 8px;
      display: inline-block;
    }

    section p {
      color: #445;
    }

    .freizeit-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 10px;
    }

    .freizeit-card {
      background: linear-gradient(135deg, #e3f2fd, #bbdefb);
      border-radius: 10px;
      padding: 20px 16px;
      text-align: center;
      border: 1px solid #90caf9;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .freizeit-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(21, 101, 192, 0.18);
    }

    .freizeit-card .icon {
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .freizeit-card p {
      font-weight: 600;
      color: #1565c0;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #7a9cc5;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Mathias Christ</h1>
    <p>Willkommen auf meiner Seite</p>
  </header>

  <main>

    <section>
      <h2>Über mich</h2>
      <p>Hallo, ich bin Mathias Christ. Hier findest du einen kurzen Einblick in mein Leben, meinen Beruf und meine Interessen.</p>
    </section>

    <section>
      <h2>Beruf</h2>
      <p><!-- Hier deinen Beruf und deine Tätigkeit eintragen --></p>
    </section>

    <section>
      <h2>Freizeit</h2>
      <div class="freizeit-grid">
        <div class="freizeit-card">
          <div class="icon">&#127939;</div>
          <p>Sport</p>
        </div>
        <div class="freizeit-card">
          <div class="icon">&#9992;</div>
          <p>Reisen</p>
        </div>
        <div class="freizeit-card">
          <div class="icon">&#127925;</div>
          <p>Kultur &amp; Musik</p>
        </div>
      </div>
    </section>

  </main>

  <footer>
    &copy; 2026 Mathias Christ
  </footer>

</body>
</html>
